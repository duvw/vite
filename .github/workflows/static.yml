name: Deploy to Pages + VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Build for GitHub Pages
      - name: Build (Pages)
        run: npm run build:github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      # Build again for VPS (different base)
      - name: Build (VPS)
        run: npm run build:vps

      - name: Archive VPS build
        run: tar -czf vps-dist.tar.gz dist

      - name: Upload VPS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vps-dist
          path: vps-dist.tar.gz

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-vps:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download VPS artifact
        uses: actions/download-artifact@v4
        with:
          name: vps-dist

      - name: Extract
        run: tar -xzf vps-dist.tar.gz

      - name: Deploy via SSH (prepare folder)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            rm -rf /var/www/vite/*
            mkdir -p /var/www/vite

      - name: Upload files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "dist/*"
          target: "/var/www/vite"
